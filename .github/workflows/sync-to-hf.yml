name: Sync to HuggingFace Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install hf_xet and push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub[hf_xet]
          git config --global user.email "guilin@mfg-ai.dev"
          git config --global user.name "GuilinDev"
          
          # Prepare deploy directory with only text files
          mkdir -p /tmp/hf-deploy/src/engines /tmp/hf-deploy/src/processors /tmp/hf-deploy/src/utils /tmp/hf-deploy/outputs
          
          # Copy source code
          cp Dockerfile /tmp/hf-deploy/
          cp requirements.txt /tmp/hf-deploy/
          cp prototype/streamlit_app_simple.py /tmp/hf-deploy/app.py
          cp prototype/simple_rag.py /tmp/hf-deploy/src/simple_rag.py
          cp prototype/src/engines/*.py /tmp/hf-deploy/src/engines/
          cp prototype/src/processors/*.py /tmp/hf-deploy/src/processors/
          cp prototype/src/utils/*.py /tmp/hf-deploy/src/utils/
          touch /tmp/hf-deploy/src/__init__.py /tmp/hf-deploy/src/engines/__init__.py /tmp/hf-deploy/src/processors/__init__.py /tmp/hf-deploy/src/utils/__init__.py
          
          cat > /tmp/hf-deploy/README.md << 'READMEEOF'
          ---
          title: Manufacturing AI RAG Demo
          emoji: 🏭
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          pinned: false
          ---
          READMEEOF
          
          # Clone HF repo, copy files, push
          git clone https://guilindev:${HF_TOKEN}@huggingface.co/spaces/guilindev/mfg-rag-demo /tmp/hf-repo
          cp -r /tmp/hf-deploy/* /tmp/hf-repo/
          cd /tmp/hf-repo
          git add -A
          git diff --cached --quiet || (git commit -m "sync from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
